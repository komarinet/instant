<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RE:CAUSES</title>
    <style>
        /* html, bodyのCSSを変更 */
        html, body {
            margin: 0; padding: 0; background-color: #000; color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; touch-action: none;
            width: 100%; height: 100%; /* vh指定を削除 */
            position: fixed; /* アドレスバー対策 */
        }
        #game-container {
            position: relative; width: 100%; height: 100%;
        }
        canvas { display: block; width: 100%; height: 100%; }
        .screen {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.9); z-index: 10;
        }
        .hidden { display: none !important; }
        h1 { font-size: 2.5rem; color: #ff3366; text-shadow: 0 0 10px #ff3366; margin-bottom: 30px; text-align: center;}
        h2 { font-size: 1.5rem; border-bottom: 1px solid #555; padding-bottom: 5px; margin-bottom: 15px;}
        button { background: transparent; color: #fff; border: 1px solid #ff3366; padding: 15px 30px; font-size: 1.2rem; margin: 10px; cursor: pointer; width: 80%; max-width: 300px; transition: all 0.2s; }
        button:active { background: #ff3366; color: #000; }
        #char-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; width: 90%; max-width: 400px; }
        .char-btn { padding: 10px; width: calc(50% - 15px); font-size: 1rem; border-color: #00ffff; }
        .char-btn.selected { background: #00ffff; color: #000; }
        #char-preview { margin-top: 20px; padding: 15px; border: 1px solid #333; width: 80%; max-width: 350px; text-align: center; height: 120px; }
        #stage-list button { border-color: #ffaa00; width: 100%; margin: 5px 0;}
    </style>
</head>
<body>

<div id="game-container">
    <div id="title-screen" class="screen">
        <h1>RE:CAUSES</h1>
        <button onclick="changeScreen('char-select-screen')">START GAME</button>
    </div>

    <div id="char-select-screen" class="screen hidden">
        <h2>AGENT SELECT</h2>
        <div id="char-list"></div>
        <div id="char-preview">
            <div id="preview-name" style="font-weight: bold; color: #00ffff;"></div>
            <div id="preview-desc" style="font-size: 0.8rem; margin: 5px 0; color: #aaa;"></div>
            <div id="preview-weapon" style="font-size: 0.9rem; color: #ff3366;"></div>
        </div>
        <button style="margin-top:20px; border-color:#fff;" onclick="goToStageSelect()">DECIDE</button>
        <button style="border:none; text-decoration:underline; padding:5px;" onclick="changeScreen('title-screen')">Back</button>
    </div>

    <div id="stage-select-screen" class="screen hidden">
        <h2>STAGE SELECT</h2>
        <div id="stage-list" style="width: 80%; max-width: 300px;">
            <button onclick="startGame(1)">Stage 1: The Auditor</button>
            <button onclick="startGame(2)">Stage 2: Witch Ghost</button>
            <button onclick="startGame(3)">Stage 3: Chronos Mask</button>
            <button onclick="startGame(4)">Stage 4: Nano Monarch</button>
            <button onclick="startGame(5)">Stage 5: Asset-Ash</button>
            <button onclick="startGame(6)" style="border-color:#ff3366">Final Stage: The Commander</button>
        </div>
        <button style="margin-top:20px; border:none; text-decoration:underline; padding:5px;" onclick="changeScreen('char-select-screen')">Back</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    
    <div id="result-screen" class="screen hidden" style="background: rgba(0,0,0,0.7);">
        <h1 id="result-title">GAME OVER</h1>
        <button onclick="changeScreen('char-select-screen')">BACK TO MENU</button>
    </div>
</div>

<script src="js/data.js?v=0.1.4"></script>
<script src="js/adv.js?v=0.1.4"></script>
<script src="js/stg.js?v=0.1.4"></script>
<script src="js/main.js?v=0.1.4"></script>
</body>
</html>
