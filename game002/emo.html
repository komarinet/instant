<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表情・スプライト確認ツール</title>
    <style>
        body {
            background-color: #111;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #00ffff;
            text-align: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .character-section {
            margin-bottom: 50px;
        }
        .character-title {
            color: #ff3366;
            font-size: 1.5rem;
            margin-bottom: 20px;
            padding-left: 10px;
            border-left: 5px solid #ff3366;
        }
        .grid-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .sprite-card {
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            width: 180px; /* 見やすいサイズに縮小表示 */
        }
        .sprite-card canvas {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto 10px;
            background-color: #000; /* 透過部分がわかるように黒背景 */
            border-radius: 4px;
        }
        .index-number {
            color: #00ffff;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }
        .emotion-name {
            font-size: 0.9rem;
            color: #ccc;
        }
    </style>
</head>
<body>

    <h1>SPRITE & EMOTION CHECKER</h1>

    <div id="content"></div>

    <script>
        // 先生が指定した表情のリストとファイル名
        const charData = [
            {
                name: "猪狩 俊基 (igari01.png)",
                color: "#ff3366",
                src: "img/igari01.png",
                emotions: [
                    "おすまし", "微笑", "笑顔", "目閉じ",
                    "驚愕", "悲しい", "泣き", "怒り",
                    "絶望", "空欄", "空欄", "空欄"
                ]
            },
            {
                name: "柊 千華 (hiragi01.png)",
                color: "#cc33ff",
                src: "img/hiragi01.png",
                emotions: [
                    "おすまし", "笑顔", "可愛く怒る", "泣く",
                    "恥ずかしい", "怒る", "照れる", "キレる",
                    "携帯見る", "目を閉じる", "投げキッス", "焦る"
                ]
            }
        ];

        // 1キャラあたりの切り出しサイズ（1333x1500 / 4x3 = 333x500）
        const spriteWidth = 333;
        const spriteHeight = 500;

        const contentDiv = document.getElementById('content');

        charData.forEach(char => {
            // キャラクターごとのセクションを作成
            const section = document.createElement('div');
            section.className = 'character-section';

            const title = document.createElement('h2');
            title.className = 'character-title';
            title.style.color = char.color;
            title.style.borderLeftColor = char.color;
            title.innerText = char.name;
            section.appendChild(title);

            const grid = document.createElement('div');
            grid.className = 'grid-container';
            section.appendChild(grid);
            contentDiv.appendChild(section);

            // 画像を読み込んでCanvasに切り出し描画
            const img = new Image();
            img.src = char.src;
            img.onload = () => {
                char.emotions.forEach((emotion, index) => {
                    const card = document.createElement('div');
                    card.className = 'sprite-card';

                    // 切り出し用のCanvasを作成
                    const canvas = document.createElement('canvas');
                    canvas.width = spriteWidth;
                    canvas.height = spriteHeight;
                    const ctx = canvas.getContext('2d');
                    
                    // Nearest Neighborでくっきり描画
                    ctx.imageSmoothingEnabled = false;

                    // 行と列を計算して切り出し
                    const col = index % 4;
                    const row = Math.floor(index / 4);

                    ctx.drawImage(
                        img,
                        col * spriteWidth, row * spriteHeight, spriteWidth, spriteHeight,
                        0, 0, spriteWidth, spriteHeight
                    );

                    // インデックス番号と表情名のテキスト
                    const indexText = document.createElement('div');
                    indexText.className = 'index-number';
                    indexText.innerText = `Index: ${index}`;

                    const emotionText = document.createElement('div');
                    emotionText.className = 'emotion-name';
                    emotionText.innerText = emotion;

                    card.appendChild(canvas);
                    card.appendChild(indexText);
                    card.appendChild(emotionText);
                    grid.appendChild(card);
                });
            };
            
            // 画像読み込みエラー時の処理
            img.onerror = () => {
                const errorMsg = document.createElement('p');
                errorMsg.style.color = "red";
                errorMsg.innerText = `画像が見つかりません: ${char.src} (imgフォルダ内にファイルがあるか確認してください)`;
                grid.appendChild(errorMsg);
            };
        });
    </script>
</body>
</html>
