<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表情ラベル・スプライト確認ツール</title>
    <style>
        body {
            background-color: #111;
            color: #eee;
            font-family: 'Courier New', Courier, monospace; /* プログラムっぽく */
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #00ffff;
            text-align: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .character-section {
            margin-bottom: 50px;
        }
        .character-title {
            color: #ff3366;
            font-size: 1.5rem;
            margin-bottom: 20px;
            padding-left: 10px;
            border-left: 5px solid #ff3366;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .grid-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .sprite-card {
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px 10px;
            text-align: center;
            width: 180px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        .sprite-card canvas {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto 15px;
            background-color: #000; 
            border: 1px solid #333;
        }
        .index-number {
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }
        .label-name {
            color: #00ffff;
            font-weight: bold;
            font-size: 1.3rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        .emotion-desc {
            font-size: 0.8rem;
            color: #aaa;
            font-family: 'Segoe UI', sans-serif;
        }
    </style>
</head>
<body>

    <h1>SPRITE LABEL CHECKER</h1>

    <div id="content"></div>

    <script>
        // 英語ラベルと日本語の補足説明のリスト
        const charData = [
            {
                name: "猪狩 俊基 (igari01.png)",
                color: "#ff3366",
                src: "img/igari01.png",
                emotions: [
                    { label: "normal",   desc: "おすまし" },
                    { label: "smile",    desc: "微笑" },
                    { label: "happy",    desc: "笑顔" },
                    { label: "close",    desc: "目閉じ" },
                    { label: "surprise", desc: "驚愕" },
                    { label: "sad",      desc: "悲しい" },
                    { label: "cry",      desc: "泣き" },
                    { label: "anger",    desc: "怒り" },
                    { label: "despair",  desc: "絶望" },
                    { label: "blank1",   desc: "空欄" },
                    { label: "blank2",   desc: "空欄" },
                    { label: "blank3",   desc: "空欄" }
                ]
            },
            {
                name: "柊 千華 (hiragi01.png)",
                color: "#cc33ff",
                src: "img/hiragi01.png",
                emotions: [
                    { label: "normal",   desc: "おすまし" },
                    { label: "smile",    desc: "笑顔" },
                    { label: "pout",     desc: "可愛く怒る" },
                    { label: "cry",      desc: "泣く" },
                    { label: "shy",      desc: "恥ずかしい" },
                    { label: "anger",    desc: "怒る" },
                    { label: "blush",    desc: "照れる" },
                    { label: "rage",     desc: "キレる" },
                    { label: "phone",    desc: "携帯見る" },
                    { label: "close",    desc: "目を閉じる" },
                    { label: "kiss",     desc: "投げキッス" },
                    { label: "panic",    desc: "焦る" }
                ]
            }
        ];

        // 1キャラあたりの切り出しサイズ（1333x1500 / 4x3 = 333x500）
        const spriteWidth = 333;
        const spriteHeight = 500;

        const contentDiv = document.getElementById('content');

        charData.forEach(char => {
            const section = document.createElement('div');
            section.className = 'character-section';

            const title = document.createElement('h2');
            title.className = 'character-title';
            title.style.color = char.color;
            title.style.borderLeftColor = char.color;
            title.innerText = char.name;
            section.appendChild(title);

            const grid = document.createElement('div');
            grid.className = 'grid-container';
            section.appendChild(grid);
            contentDiv.appendChild(section);

            const img = new Image();
            img.src = char.src;
            img.onload = () => {
                char.emotions.forEach((emoData, index) => {
                    const card = document.createElement('div');
                    card.className = 'sprite-card';

                    const canvas = document.createElement('canvas');
                    canvas.width = spriteWidth;
                    canvas.height = spriteHeight;
                    const ctx = canvas.getContext('2d');
                    
                    ctx.imageSmoothingEnabled = false;

                    const col = index % 4;
                    const row = Math.floor(index / 4);

                    ctx.drawImage(
                        img,
                        col * spriteWidth, row * spriteHeight, spriteWidth, spriteHeight,
                        0, 0, spriteWidth, spriteHeight
                    );

                    // インデックス番号
                    const indexText = document.createElement('div');
                    indexText.className = 'index-number';
                    indexText.innerText = `Index: ${index}`;

                    // 英語のラベル名（メイン）
                    const labelText = document.createElement('div');
                    labelText.className = 'label-name';
                    labelText.innerText = emoData.label;

                    // 日本語の意味（サブ）
                    const descText = document.createElement('div');
                    descText.className = 'emotion-desc';
                    descText.innerText = `(${emoData.desc})`;

                    card.appendChild(canvas);
                    card.appendChild(indexText);
                    card.appendChild(labelText);
                    card.appendChild(descText);
                    grid.appendChild(card);
                });
            };
            
            img.onerror = () => {
                const errorMsg = document.createElement('p');
                errorMsg.style.color = "red";
                errorMsg.innerText = `画像が見つかりません: ${char.src}`;
                grid.appendChild(errorMsg);
            };
        });
    </script>
</body>
</html>
