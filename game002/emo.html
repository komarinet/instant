<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表情・spriteIndex 対応表</title>
    <style>
        body {
            background-color: #111;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #00ffff;
            text-align: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        .description {
            text-align: center;
            color: #aaa;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        
        /* タブ切り替え用のデザイン */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: #222;
            border: 1px solid #444;
            color: #aaa;
            padding: 10px 20px;
            font-size: 1.1rem;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s;
        }
        .tab-btn:hover {
            background: #333;
            color: #fff;
        }
        .tab-btn.active {
            background: #1a1a1a;
            color: #fff;
            font-weight: bold;
            border-bottom: 4px solid; /* JSでキャラカラーを適用 */
        }

        .character-section {
            display: none; /* デフォルトは非表示、JSで切り替え */
            animation: fadeIn 0.3s ease-in-out;
        }
        .character-section.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grid-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        .sprite-card {
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            width: 200px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        .sprite-card canvas {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto 15px;
            background-color: #000;
            border: 1px solid #333;
            border-radius: 4px;
        }
        
        /* コピーボタン風のデザイン */
        .code-snippet {
            background: #000;
            color: #00ffff;
            padding: 8px 5px;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 10px;
            cursor: pointer;
            border: 1px solid #00ffff;
            transition: background 0.2s;
        }
        .code-snippet:hover {
            background: rgba(0, 255, 255, 0.2);
        }
        .code-snippet:active {
            background: #00ffff;
            color: #000;
        }
        .emotion-desc {
            font-size: 1rem;
            color: #fff;
            font-weight: bold;
        }
        
        /* トースト通知（コピー完了） */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #00ffff;
            color: #000;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <h1>表情・spriteIndex 対応表</h1>
    <p class="description">タブでキャラクターを切り替えられます。コード部分をクリックするとクリップボードにコピーされます。</p>

    <div class="tabs" id="tabs-container"></div>

    <div id="content"></div>

    <div id="toast">コピーしました！</div>

    <script>
        // キャラクターデータ（各務 栞を追加）
        const charData = [
            {
                id: "igari",
                name: "猪狩 俊基",
                color: "#ff3366",
                src: "img/igari01.png",
                emotions: [
                    "おすまし", "微笑", "笑顔", "目閉じ",
                    "驚愕", "悲しい", "泣き", "怒り",
                    "絶望", "空欄", "空欄", "空欄"
                ]
            },
            {
                id: "hiragi",
                name: "柊 千華",
                color: "#cc33ff",
                src: "img/hiragi01.png",
                emotions: [
                    "おすまし", "笑顔", "可愛く怒る", "泣く",
                    "恥ずかしい", "怒る", "照れる", "キレる",
                    "携帯見る", "目を閉じる", "投げキッス", "焦る"
                ]
            },
            {
                id: "kagami",
                name: "各務 栞",
                color: "#33ff33",
                src: "img/kagami.png", // 新規追加の画像
                emotions: [
                    "おすまし", "微笑", "面倒くさい", "閉眼怒り",
                    "爆笑", "泣き", "ジト目", "絶望",
                    "照れ", "閉眼", "爽やか笑い", "吐き捨てる"
                ]
            }
        ];

        const tabsContainer = document.getElementById('tabs-container');
        const contentDiv = document.getElementById('content');

        // タブ切り替えロジック
        window.showChar = function(charId) {
            // タブの見た目を更新
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                btn.style.borderBottomColor = 'transparent';
            });
            const activeBtn = document.getElementById(`tab-${charId}`);
            activeBtn.classList.add('active');
            activeBtn.style.borderBottomColor = activeBtn.dataset.color;

            // コンテンツの表示を更新
            document.querySelectorAll('.character-section').forEach(sec => {
                sec.classList.remove('active');
            });
            document.getElementById(`sec-${charId}`).classList.add('active');
        };

        // コピー機能とトースト通知
        window.copyToClipboard = function(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.style.opacity = 1;
                setTimeout(() => { toast.style.opacity = 0; }, 1500);
            });
        };

        // UIの生成
        charData.forEach((char, index) => {
            // 1. タブボタンの生成
            const btn = document.createElement('button');
            btn.id = `tab-${char.id}`;
            btn.className = 'tab-btn';
            btn.innerText = char.name;
            btn.dataset.color = char.color;
            btn.onclick = () => showChar(char.id);
            tabsContainer.appendChild(btn);

            // 2. セクションの生成
            const section = document.createElement('div');
            section.id = `sec-${char.id}`;
            section.className = 'character-section';
            
            const grid = document.createElement('div');
            grid.className = 'grid-container';
            section.appendChild(grid);
            contentDiv.appendChild(section);

            // 3. 画像の読み込みと切り出し
            const img = new Image();
            img.src = char.src;
            img.onload = () => {
                // ★画像サイズから自動計算 (1333x1500でも1000x1500でも対応)
                const spriteWidth = img.width / 4;
                const spriteHeight = img.height / 3;

                char.emotions.forEach((desc, i) => {
                    const card = document.createElement('div');
                    card.className = 'sprite-card';

                    const canvas = document.createElement('canvas');
                    canvas.width = spriteWidth;
                    canvas.height = spriteHeight;
                    const ctx = canvas.getContext('2d');
                    
                    ctx.imageSmoothingEnabled = false;

                    const col = i % 4;
                    const row = Math.floor(i / 4);

                    // 小数点切り出しによる滲みを防ぐためMath.floorを使用
                    ctx.drawImage(
                        img,
                        Math.floor(col * spriteWidth), Math.floor(row * spriteHeight), Math.floor(spriteWidth), Math.floor(spriteHeight),
                        0, 0, Math.floor(spriteWidth), Math.floor(spriteHeight)
                    );

                    // クリックでコピーできるコードブロック
                    const codeText = `spriteIndex: ${i}`;
                    const codeDiv = document.createElement('div');
                    codeDiv.className = 'code-snippet';
                    codeDiv.innerText = codeText;
                    codeDiv.title = "クリックしてコピー";
                    codeDiv.onclick = () => copyToClipboard(codeText);

                    // 日本語の意味
                    const descText = document.createElement('div');
                    descText.className = 'emotion-desc';
                    descText.innerText = desc;

                    card.appendChild(canvas);
                    card.appendChild(codeDiv);
                    card.appendChild(descText);
                    grid.appendChild(card);
                });
            };
            
            img.onerror = () => {
                const errorMsg = document.createElement('p');
                errorMsg.style.color = "red";
                errorMsg.innerText = `画像が見つかりません: ${char.src} (imgフォルダ内にファイルがあるか確認してください)`;
                grid.appendChild(errorMsg);
            };
        });

        // 最初のキャラクター（猪狩）を初期表示
        setTimeout(() => { showChar(charData[0].id); }, 100);

    </script>
</body>
</html>
