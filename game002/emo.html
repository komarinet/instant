<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表情・spriteIndex 対応表</title>
    <style>
        body {
            background-color: #111;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #00ffff;
            text-align: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .description {
            text-align: center;
            color: #aaa;
            margin-bottom: 30px;
        }
        .character-section {
            margin-bottom: 60px;
        }
        .character-title {
            color: #ff3366;
            font-size: 1.5rem;
            margin-bottom: 20px;
            padding-left: 10px;
            border-left: 5px solid #ff3366;
        }
        .grid-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .sprite-card {
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            width: 200px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        .sprite-card canvas {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto 15px;
            background-color: #000;
            border: 1px solid #333;
            border-radius: 4px;
        }
        .code-snippet {
            background: #000;
            color: #00ffff;
            padding: 5px;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 10px;
            user-select: all; /* クリックで全選択できるように */
        }
        .emotion-desc {
            font-size: 1rem;
            color: #fff;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>表情・spriteIndex 対応表</h1>
    <p class="description">data.js を編集する際、使いたい表情の <code>spriteIndex: 番号</code> を確認するためのシートです。</p>

    <div id="content"></div>

    <script>
        // 日本語の補足説明リスト
        const charData = [
            {
                name: "猪狩 俊基 (igari01.png)",
                color: "#ff3366",
                src: "img/igari01.png",
                emotions: [
                    "おすまし", "微笑", "笑顔", "目閉じ",
                    "驚愕", "悲しい", "泣き", "怒り",
                    "絶望", "空欄", "空欄", "空欄"
                ]
            },
            {
                name: "柊 千華 (hiragi01.png)",
                color: "#cc33ff",
                src: "img/hiragi01.png",
                emotions: [
                    "おすまし", "笑顔", "可愛く怒る", "泣く",
                    "恥ずかしい", "怒る", "照れる", "キレる",
                    "携帯見る", "目を閉じる", "投げキッス", "焦る"
                ]
            }
        ];

        // 1キャラあたりの切り出しサイズ（1333x1500 / 4x3 = 333x500）
        const spriteWidth = 333;
        const spriteHeight = 500;

        const contentDiv = document.getElementById('content');

        charData.forEach(char => {
            const section = document.createElement('div');
            section.className = 'character-section';

            const title = document.createElement('h2');
            title.className = 'character-title';
            title.style.color = char.color;
            title.style.borderLeftColor = char.color;
            title.innerText = char.name;
            section.appendChild(title);

            const grid = document.createElement('div');
            grid.className = 'grid-container';
            section.appendChild(grid);
            contentDiv.appendChild(section);

            const img = new Image();
            img.src = char.src;
            img.onload = () => {
                char.emotions.forEach((desc, index) => {
                    const card = document.createElement('div');
                    card.className = 'sprite-card';

                    const canvas = document.createElement('canvas');
                    canvas.width = spriteWidth;
                    canvas.height = spriteHeight;
                    const ctx = canvas.getContext('2d');
                    
                    ctx.imageSmoothingEnabled = false;

                    const col = index % 4;
                    const row = Math.floor(index / 4);

                    ctx.drawImage(
                        img,
                        col * spriteWidth, row * spriteHeight, spriteWidth, spriteHeight,
                        0, 0, spriteWidth, spriteHeight
                    );

                    // コピーしやすいようにコード表記にする
                    const codeText = document.createElement('div');
                    codeText.className = 'code-snippet';
                    codeText.innerText = `spriteIndex: ${index}`;

                    // 日本語の意味
                    const descText = document.createElement('div');
                    descText.className = 'emotion-desc';
                    descText.innerText = desc;

                    card.appendChild(canvas);
                    card.appendChild(codeText);
                    card.appendChild(descText);
                    grid.appendChild(card);
                });
            };
            
            img.onerror = () => {
                const errorMsg = document.createElement('p');
                errorMsg.style.color = "red";
                errorMsg.innerText = `画像が見つかりません: ${char.src}`;
                grid.appendChild(errorMsg);
            };
        });
    </script>
</body>
</html>
