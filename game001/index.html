<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber-Sweep v5.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css?v=5.6">
</head>
<body class="scan-effect">

    <div id="scene-title" class="scene flex flex-col items-center justify-center p-4">
        <h1 class="text-5xl font-bold font-orbitron text-[var(--neon-blue)] tracking-tighter mb-2">CYBER-SWEEP</h1>
        <p class="text-xs text-gray-500 mb-12">TACTICAL OVERLOAD v5.6</p>
        <button id="start-btn" class="cyber-panel px-12 py-4 rounded-lg font-bold text-[var(--neon-blue)] active:scale-95 transition-all">
            INITIALIZE CONNECTION
        </button>
    </div>

    <div id="scene-prologue" class="scene hidden relative overflow-hidden bg-black z-50">
        <div id="space-bg"></div>
        <img src="img/ship.png" id="prologue-ship" alt="ship" class="absolute">
        <div id="explosion-layer"></div>
        <div id="prologue-text" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none z-[60]">
            <h2 class="text-4xl font-orbitron font-bold text-[var(--neon-pink)] opacity-0 transition-opacity duration-500">SYSTEM BREACH</h2>
            <p class="text-[var(--neon-blue)] opacity-0 transition-opacity duration-1000 mt-2">EMERGENCY PROTOCOL ACTIVATED</p>
        </div>
        <button id="skip-prologue-btn" class="absolute bottom-10 right-10 text-[10px] text-gray-600 border border-gray-800 px-2 py-1 rounded z-[70]">SKIP >></button>
    </div>

    <div id="scene-select" class="scene hidden flex flex-col items-center justify-center p-4">
        <h2 class="text-2xl font-orbitron font-bold text-[var(--neon-blue)] mb-8">SELECT SECTOR</h2>
        <div id="stage-buttons" class="grid grid-cols-1 gap-4 w-full max-w-xs"></div>
    </div>

    <div id="scene-game" class="scene hidden flex flex-col items-center justify-center p-4">
        <div class="w-full max-w-md mb-4 space-y-3 relative">
            <div class="flex justify-between items-start">
                <div>
                    <h1 id="game-title-text" class="text-2xl font-bold font-orbitron text-[var(--neon-blue)] tracking-wider">CYBER-SWEEP</h1>
                    <p id="level-label" class="text-[10px] text-gray-500">SECTOR DECRYPTING...</p>
                </div>
                <div class="flex flex-col items-end gap-2">
                    <button id="audio-toggle-btn" class="font-bold">SOUND: ON</button>
                    <div id="level-display" class="text-xs text-[var(--neon-pink)] font-bold">LEVEL: 01 / 05</div>
                </div>
            </div>
            <div class="cyber-panel p-3 rounded-lg space-y-2">
                <div class="flex items-center gap-2"><span class="text-[10px] w-8 text-gray-400">HP</span><div class="flex-1 bg-gray-800 rounded-full overflow-hidden border border-gray-700"><div id="hp-bar" class="progress-bar bg-[var(--neon-pink)] w-full"></div></div><span id="hp-text" class="text-[10px] w-8 text-right font-bold text-[var(--neon-pink)]">100%</span></div>
                <div class="flex items-center gap-2"><span class="text-[10px] w-8 text-gray-400">ENG</span><div class="flex-1 bg-gray-800 rounded-full overflow-hidden border border-gray-700"><div id="energy-bar" class="progress-bar bg-[var(--neon-blue)] w-0"></div></div><span id="energy-text" class="text-[10px] w-8 text-right font-bold text-[var(--neon-blue)]">0%</span></div>
            </div>
        </div>
        <div id="game-viewport">
            <div id="edge-top" class="edge-bar"></div><div id="edge-bottom" class="edge-bar"></div><div id="edge-left" class="edge-bar"></div><div id="edge-right" class="edge-bar"></div>
            <div id="game-container"><div id="grid" class="grid gap-1 p-6" style="width: fit-content;"></div></div>
        </div>
        <div class="w-full max-w-md mt-4 grid grid-cols-3 gap-2">
            <button id="flag-mode-btn" class="cyber-panel p-2 rounded-lg flex flex-col items-center justify-center"><span class="text-[10px] font-bold">MARK</span></button>
            <button id="scan-btn" class="cyber-panel p-2 rounded-lg flex flex-col items-center justify-center opacity-50" disabled><span class="text-[10px] font-bold text-[var(--neon-blue)]">SCAN</span></button>
            <button id="back-to-menu-btn" class="cyber-panel p-2 rounded-lg flex flex-col items-center justify-center"><span class="text-[10px] font-bold text-[var(--neon-yellow)]">ABORT</span></button>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[100] hidden backdrop-blur-md">
        <div class="cyber-panel p-8 rounded-2xl text-center max-w-sm w-full mx-4">
            <h2 id="modal-title" class="text-3xl font-orbitron font-bold mb-4">SYSTEM HALT</h2>
            <p id="modal-desc" class="text-sm text-gray-300 mb-8"></p>
            <button id="modal-btn-main" class="w-full py-3 rounded-lg border-2 border-[var(--neon-blue)] text-[var(--neon-blue)] font-bold">再接続</button>
        </div>
    </div>
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-[var(--neon-blue)] text-black px-4 py-2 rounded-full font-bold text-xs opacity-0 transition-opacity pointer-events-none z-[110]"></div>

    <script src="audio.js?v=5.6"></script>
    <script src="game.js?v=5.6"></script>
    <script src="main.js?v=5.6"></script>
</body>
</html>
