<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM DIAGNOSTICS v1.1</title>
    <style>
        body { background: #05050a; color: #00f3ff; font-family: monospace; padding: 20px; line-height: 1.6; }
        .log { border: 1px solid #1a1a2e; padding: 15px; background: #0a0a0f; border-radius: 8px; }
        .ok { color: #00ff41; }
        .error { color: #ff00ff; font-weight: bold; }
    </style>
</head>
<body>
    <h1>[ SYSTEM DIAGNOSTICS v1.1 ]</h1>
    <div class="log" id="log">診断開始...<br></div>
    <script>
        const log = document.getElementById('log');
        function addLog(msg, type = '') {
            const div = document.createElement('div');
            div.className = type;
            div.innerHTML = `> ${msg}`;
            log.appendChild(div);
        }
        async function checkImg(p) {
            return new Promise(r => {
                const i = new Image();
                i.onload = () => r(true);
                i.onerror = () => r(false);
                i.src = p;
            });
        }
        async function run() {
            const imgs = ['img/ship.png', 'img/space02.png', 'img/bomb.png'];
            for (const p of imgs) {
                const ok = await checkImg(p);
                addLog(`${p}: ${ok ? '<span class="ok">OK</span>' : '<span class="error">NOT FOUND</span>'}`);
            }
            addLog("<br>診断完了。OKであれば index.html を開いてください。");
        }
        window.onload = run;
    </script>
</body>
</html>
