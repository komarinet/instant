<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM DIAGNOSTICS - CYBER-SWEEP</title>
    <style>
        body { background: #05050a; color: #00f3ff; font-family: monospace; padding: 20px; }
        .log { border: 1px solid #1a1a2e; padding: 15px; background: #0a0a0f; }
        .ok { color: #00ff41; }
        .error { color: #ff00ff; font-weight: bold; }
        .file-check { margin-bottom: 5px; }
    </style>
</head>
<body>
    <h1>[ SYSTEM DIAGNOSTICS v1.0 ]</h1>
    <div class="log" id="log">診断を開始します...<br></div>

    <script>
        const log = document.getElementById('log');
        function addLog(msg, type = '') {
            const div = document.createElement('div');
            div.className = `file-check ${type}`;
            div.innerHTML = `> ${msg}`;
            log.appendChild(div);
        }

        async function checkImage(path) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve(true);
                img.onerror = () => resolve(false);
                img.src = path;
            });
        }

        async function run() {
            addLog("Checking directory: /img/");
            const images = [
                { name: 'ship.png', path: 'img/ship.png' },
                { name: 'space02.png', path: 'img/space02.png' },
                { name: 'bomb.png', path: 'img/bomb.png' }
            ];

            for (const item of images) {
                const exists = await checkImage(item.path);
                if (exists) {
                    addLog(`${item.name}: <span class="ok">DETECTED</span>`);
                } else {
                    addLog(`${item.name}: <span class="error">MISSING (Check /img/ folder)</span>`, 'error');
                }
            }

            addLog("<br>Checking Scripts...");
            const scripts = ['audio.js', 'game.js', 'main.js', 'style.css'];
            for (const s of scripts) {
                try {
                    const res = await fetch(s);
                    if (res.ok) addLog(`${s}: <span class="ok">FOUND</span>`);
                    else throw new Error();
                } catch {
                    addLog(`${s}: <span class="error">NOT FOUND</span>`, 'error');
                }
            }
            addLog("<br>診断完了。エラーがなければ index.html を実行してください。");
        }
        window.onload = run;
    </script>
</body>
</html>
