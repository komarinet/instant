<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Games - 暇つぶしゲーム集</title>
    <style>
        :root {
            --primary-color: #00d2ff;
            --secondary-color: #3a7bd5;
            --bg-color: #1a1a2e;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-color), #16213e);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        p {
            opacity: 0.8;
            font-size: 0.9rem;
        }

        .game-list {
            width: 100%;
            max-width: 500px;
            display: grid;
            gap: 15px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            transition: transform 0.2s, background 0.2s;
            backdrop-filter: blur(5px);
        }

        .game-card:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.2);
        }

        footer {
            margin-top: auto;
            padding: 40px 0 20px;
            text-align: center;
            font-size: 0.8rem;
        }

        .donate-link {
            color: var(--primary-color);
            text-decoration: none;
            border: 1px solid var(--primary-color);
            padding: 5px 15px;
            border-radius: 20px;
            transition: 0.3s;
        }

        .donate-link:hover {
            background: var(--primary-color);
            color: var(--bg-color);
        }
    </style>
</head>
<body>

    <header>
        <h1>INSTANT GAMES</h1>
        <p>スマートフォンですぐに遊べる暇つぶしゲームたち</p>
    </header>

    <div class="game-list">
        <a href="game001/index.html" class="game-card">🎮 Game 001 (準備中)</a>
        <a href="game002/index.html" class="game-card">🦖 Game 002 (準備中)</a>
        <a href="game003/index.html" class="game-card">✨ Game 003 (準備中)</a>
    </div>

    <footer>
        <p>&copy; 2026 komarinet</p>
        <p>
            気に入っていただけたら 
            <a href="#" class="donate-link">開発を支援する（寄付）</a>
        </p>
    </footer>

</body>
</html>
